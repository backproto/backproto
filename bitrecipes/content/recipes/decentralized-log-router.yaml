name: "Decentralized Log Router"
description: "Log ingestion where collector nodes declare capacity. Overwhelmed nodes reroute streams to nodes with spare capacity. Streaming payments compensate operators."
domain: infrastructure
difficulty: advanced
contracts_used:
  - CapacityRegistry
  - BackpressurePool
  - PricingCurve
  - EscrowBuffer
  - CompletionTracker
  - StakeManager
  - Pipeline

funding:
  escrowBuffer: "0x8d2f5b40315cccf9b7aa10869c035f9c7a0a3160"
  superfluid:
    enabled: true

steps:
  - id: log-ingest
    kind: log-ingest
    providers:
      - name: Collector-East
        endpoint: "https://collector-east.example/ingest"
        capacityAttestor: "0x6f58f28c0a270c198c65cff5c5a7ba9d86088948"
        stake:
          manager: "0xdc26b147030f635a2f8ac466d28a88b3b33ca6b3"
          min: "1000 USDC"
        pricingCurve:
          base: 0.00005
          k: 0.30
          alpha: 2.0
      - name: Collector-West
        endpoint: "https://collector-west.example/ingest"
        capacityAttestor: "0x6f58f28c0a270c198c65cff5c5a7ba9d86088948"
        stake:
          manager: "0xdc26b147030f635a2f8ac466d28a88b3b33ca6b3"
          min: "1000 USDC"
        pricingCurve:
          base: 0.00004
          k: 0.35
          alpha: 1.8

  - id: route-and-store
    kind: log-ingest
    providers:
      - name: Storage-Primary
        endpoint: "https://storage-primary.example/store"
        capacityAttestor: "0x6f58f28c0a270c198c65cff5c5a7ba9d86088948"
        stake:
          manager: "0xdc26b147030f635a2f8ac466d28a88b3b33ca6b3"
          min: "2000 USDC"
        pricingCurve:
          base: 0.0001
          k: 0.20
          alpha: 2.5
      - name: Storage-Replica
        endpoint: "https://storage-replica.example/store"
        capacityAttestor: "0x6f58f28c0a270c198c65cff5c5a7ba9d86088948"
        stake:
          manager: "0xdc26b147030f635a2f8ac466d28a88b3b33ca6b3"
          min: "2000 USDC"
        pricingCurve:
          base: 0.0001
          k: 0.25
          alpha: 2.0

  - id: delivery-confirm
    kind: attestation
    providers:
      - name: Verifier
        endpoint: "https://verifier.example/confirm"
        capacityAttestor: "0x6f58f28c0a270c198c65cff5c5a7ba9d86088948"
        stake:
          manager: "0xdc26b147030f635a2f8ac466d28a88b3b33ca6b3"
          min: "500 USDC"
        pricingCurve:
          base: 0.0005
          k: 0.10
          alpha: 3.0

routing:
  policy: capacity_weighted
  fairness: lyapunov_optimal
  minProviders: 2
  maxSharePerProvider: 0.6

settlement:
  backpressurePool: "0x8e999a246afea241cf3c1d400dd7786cf591fa88"
  completionTracker: "0xff3dab79a53ffd11bae041e094ed0b6217acfc3c"
  penalties:
    slo:
      p95_latency_ms: 200
      timeout_ms: 2000
    misreportingMultiplier: 3.0

observability:
  export: ["opentelemetry", "json", "webhook"]
